# .forgejo/workflows/release.yml
name: Release

on:
  push:
    tags:
      - v*

jobs:
  build-core:
    name: Build Rust Crates (Release)
    runs-on: codeberg-medium
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4
        timeout-minutes: 5

      - name: Install Rust toolchain
        uses: https://github.com/dtolnay/rust-toolchain@stable
        timeout-minutes: 10

      - name: Install system dependencies
        run: apt-get update && apt-get install -y --no-install-recommends pkg-config libssl-dev
        timeout-minutes: 5

      - name: Cache Cargo registry and build
        uses: https://data.forgejo.org/actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-rust-
        timeout-minutes: 5

      - name: Build release
        run: cargo build --release --workspace --exclude wo-pdf --exclude wo-webdav
        timeout-minutes: 60

      - name: Upload Rust artifacts
        uses: https://data.forgejo.org/actions/upload-artifact@v4
        with:
          name: rust-release
          path: target/release/
        timeout-minutes: 10

  build-web:
    name: Build Web Apps
    runs-on: codeberg-medium
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4
        timeout-minutes: 5

      - name: Setup pnpm
        uses: https://github.com/pnpm/action-setup@v4
        with:
          version: 10
        timeout-minutes: 5

      - name: Setup Node.js
        uses: https://data.forgejo.org/actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
        timeout-minutes: 5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 10

      - name: Build web apps
        run: pnpm build
        timeout-minutes: 15

      - name: Upload web artifacts
        uses: https://data.forgejo.org/actions/upload-artifact@v4
        with:
          name: web-build
          path: |
            apps/*/dist/
            packages/*/dist/
        timeout-minutes: 10

  create-release:
    name: Create Release
    runs-on: codeberg-medium
    needs: [build-core, build-web]
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4
        timeout-minutes: 5

      - name: Download Rust artifacts
        uses: https://data.forgejo.org/actions/download-artifact@v4
        with:
          name: rust-release
          path: target/release/
        timeout-minutes: 10

      - name: Download web artifacts
        uses: https://data.forgejo.org/actions/download-artifact@v4
        with:
          name: web-build
          path: web-dist/
        timeout-minutes: 10

      - name: Create Forgejo release
        uses: https://codeberg.org/forgejo/release@v2
        with:
          direction: upload
          title: "Release ${{ forgejo.ref_name }}"
          tag: ${{ forgejo.ref_name }}
          token: ${{ secrets.FORGEJO_TOKEN }}
          files: |
            target/release/worldoffice-*
            web-dist/**/*
        timeout-minutes: 10
