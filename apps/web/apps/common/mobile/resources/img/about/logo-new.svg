<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="512"
   height="512"
   viewBox="0 0 512 512"
   version="1.1"
   id="svg52"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <!-- Background: deep void -->
  <path
     id="rect2"
     style="fill:#0b0b1e"
     d="M 0,0 H 512 V 512 H 0 Z" />
  <!-- Subtle radial glow behind the structure -->
  <defs
     id="defs24">
    <radialGradient
       id="glow"
       cx="50%"
       cy="45%"
       r="40%">
      <stop
         offset="0%"
         stop-color="#0d1a3a"
         id="stop4" />
      <stop
         offset="100%"
         stop-color="#0b0b1e"
         id="stop6" />
    </radialGradient>
    <linearGradient
       id="cyanGrad"
       x1="0%"
       y1="0%"
       x2="100%"
       y2="100%">
      <stop
         offset="0%"
         stop-color="#00d4ff"
         id="stop9" />
      <stop
         offset="100%"
         stop-color="#0088aa"
         id="stop11" />
    </linearGradient>
    <linearGradient
       id="goldGrad"
       x1="0%"
       y1="0%"
       x2="100%"
       y2="100%">
      <stop
         offset="0%"
         stop-color="#e8b931"
         id="stop14" />
      <stop
         offset="100%"
         stop-color="#c49520"
         id="stop16" />
    </linearGradient>
    <linearGradient
       id="indigoGrad"
       x1="0%"
       y1="0%"
       x2="80%"
       y2="100%">
      <stop
         offset="0%"
         stop-color="#252550"
         id="stop19" />
      <stop
         offset="100%"
         stop-color="#12122a"
         id="stop21" />
    </linearGradient>
  </defs>
  <path
     id="rect26"
     style="fill:url(#glow)"
     d="M 0,0 H 512 V 512 H 0 Z" />
  <!-- === DECONSTRUCTIVIST PRISM === -->
  <!-- 
    Architecture: An abstract crystalline structure suggesting 
    a deconstructivist building viewed from an oblique elevated angle.
    Multiple faceted planes create depth through color and occlusion.
    Inspired by: Zaha Hadid, Daniel Libeskind, Frank Gehry
  -->
  <!-- Layer 1 (deepest): Back-right face - deep indigo volume -->
  <path
     id="polygon28"
     style="fill:url(#indigoGrad)"
     d="M 275,72 405,195 365,430 228,350 Z" />
  <!-- Layer 2: Left face - dark teal, creates corner depth -->
  <path
     id="polygon30"
     style="fill:#004466"
     d="M 110,165 275,72 228,350 88,325 Z" />
  <!-- Layer 3: Top face - deep purple, closes the top volume -->
  <path
     id="polygon32"
     style="fill:#2d1b69"
     d="M 110,165 275,72 405,195 255,238 Z" />
  <!-- Layer 4: Front-right facet - electric cyan, catches light -->
  <path
     id="polygon34"
     style="opacity:0.92;fill:url(#cyanGrad)"
     d="m 405,195 40,90 -60,183 -20,-38 z" />
  <!-- Layer 5: Lower-left cantilever - warm gold accent -->
  <path
     id="polygon36"
     style="opacity:0.88;fill:url(#goldGrad)"
     d="M 88,325 228,350 185,452 58,432 Z" />
  <!-- Layer 6: Floating shard - upper right, cyan accent -->
  <path
     id="polygon38"
     style="opacity:0.35;fill:#00d4ff"
     d="m 330,55 65,65 -25,65 -60,-45 z" />
  <!-- Layer 7: Small floating element - gold highlight -->
  <path
     id="polygon40"
     style="opacity:0.3;fill:#e8b931"
     d="m 395,120 40,35 -15,55 -40,-30 z" />
  <!-- === EDGE HIGHLIGHTS === -->
  <!-- Subtle white edge lines on key structural edges -->
  <path
     id="line42"
     style="opacity:0.25;stroke:#ffffff;stroke-width:1.2"
     d="M 275,72 405,195" />
  <path
     id="line44"
     style="opacity:0.2;stroke:#ffffff"
     d="m 405,195 40,90" />
  <path
     id="line46"
     style="opacity:0.15;stroke:#ffffff"
     d="M 275,72 110,165" />
  <path
     id="line48"
     style="opacity:0.2;stroke:#00d4ff;stroke-width:0.8"
     d="M 405,195 255,238" />
  <!-- === BASE SHADOW === -->
  <path
     id="polygon50"
     style="opacity:0.5;fill:#060610"
     d="m 88,325 140,25 137,80 20,38 L 185,452 58,432 Z" />
</svg>
