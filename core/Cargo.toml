[workspace]
resolver = "2"
members = [
    "crates/eo-common",
    "crates/eo-unicode",
    "crates/eo-txt",
    "crates/eo-fb2",
    "crates/eo-html",
    "crates/eo-xps",
    "crates/eo-ofd",
    "crates/eo-djvu",
    "crates/eo-epub",
    "crates/eo-office-utils",
    "crates/eo-rtf",
    "crates/eo-hwp",
    "crates/eo-pdf",
    "crates/eo-odf",
    "crates/eo-ooxml",
    "crates/eo-msbinary",
    "crates/eo-docx-renderer",
    "crates/eo-x2t",
    "crates/eo-renderer",
    "crates/eo-fonts",
    "crates/eo-raster",
]

[workspace.dependencies]
anyhow = "1"
thiserror = "2"
serde = "1"
serde_json = "1"
zip = "2"
flate2 = "1"
