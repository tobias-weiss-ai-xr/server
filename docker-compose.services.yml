# World-Office Application Services
# ==================================
# Runs all Rust microservices and the document server.
# Requires the infrastructure stack from docker-compose.yml (postgres, redis, rabbitmq).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.services.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.services.yml logs -f api-gateway
#   docker compose -f docker-compose.yml -f docker-compose.services.yml down

services:
  # ── Core Microservices ───────────────────────────────────────────────

  identity-service:
    build:
      context: .
      dockerfile: services.Dockerfile
      args:
        SERVICE_NAME: identity-service
    container_name: world-office-identity
    restart: unless-stopped
    ports:
      - "${IDENTITY_PORT:-8001}:8001"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-worldoffice}:${POSTGRES_PASSWORD:-worldoffice_dev}@postgres:5432/${POSTGRES_DB:-world_office}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3

  storage-service:
    build:
      context: .
      dockerfile: services.Dockerfile
      args:
        SERVICE_NAME: storage-service
    container_name: world-office-storage
    restart: unless-stopped
    ports:
      - "${STORAGE_PORT:-8002}:8002"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-worldoffice}:${POSTGRES_PASSWORD:-worldoffice_dev}@postgres:5432/${POSTGRES_DB:-world_office}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3

  conversion-service:
    build:
      context: .
      dockerfile: services.Dockerfile
      args:
        SERVICE_NAME: conversion-service
    container_name: world-office-conversion
    restart: unless-stopped
    ports:
      - "${CONVERSION_PORT:-8003}:8003"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-worldoffice}:${POSTGRES_PASSWORD:-worldoffice_dev}@postgres:5432/${POSTGRES_DB:-world_office}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3

  coauthoring-service:
    build:
      context: .
      dockerfile: services.Dockerfile
      args:
        SERVICE_NAME: coauthoring-service
    container_name: world-office-coauthoring
    restart: unless-stopped
    ports:
      - "${COAUTHORING_PORT:-8004}:8004"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-worldoffice}:${POSTGRES_PASSWORD:-worldoffice_dev}@postgres:5432/${POSTGRES_DB:-world_office}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3

  session-service:
    build:
      context: .
      dockerfile: services.Dockerfile
      args:
        SERVICE_NAME: session-service
    container_name: world-office-session
    restart: unless-stopped
    ports:
      - "${SESSION_PORT:-8005}:8005"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-worldoffice}:${POSTGRES_PASSWORD:-worldoffice_dev}@postgres:5432/${POSTGRES_DB:-world_office}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3

  # ── API Gateway ──────────────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: services.Dockerfile
      args:
        SERVICE_NAME: api-gateway
    container_name: world-office-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      IDENTITY_SERVICE_URL: http://identity-service:8001
      STORAGE_SERVICE_URL: http://storage-service:8002
      CONVERSION_SERVICE_URL: http://conversion-service:8003
      COAUTHORING_SERVICE_URL: http://coauthoring-service:8004
      SESSION_SERVICE_URL: http://session-service:8005
    depends_on:
      identity-service:
        condition: service_healthy
      storage-service:
        condition: service_healthy
      conversion-service:
        condition: service_healthy
      coauthoring-service:
        condition: service_healthy
      session-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3

  # ── Document Server ──────────────────────────────────────────────────

  docserver:
    build:
      context: .
      dockerfile: core/crates/wo-docserver/Dockerfile
    container_name: world-office-docserver
    restart: unless-stopped
    ports:
      - "${DOCSERVER_PORT:-80}:80"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      JWT_SECRET: ${DOCSERVER_JWT_SECRET:-${JWT_SECRET:-dev-docserver-secret}}
      WOPI_HOST_URL: ${WOPI_HOST_URL:-http://ocis:9200}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3
