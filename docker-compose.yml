# World-Office Development Infrastructure
# ========================================
# Provides the backing services needed by all World-Office microservices:
#   - PostgreSQL: primary relational store for identity, session, audit, storage, coauthoring
#   - Redis: pub/sub for coauthoring real-time sync, session caching, rate limiting
#   - RabbitMQ: async job queue for conversion service, webhook delivery, event bus
#   - Grafana: observability dashboard (port 3000)
#   - Prometheus: metrics collection (port 9090)
#   - Tempo: distributed tracing backend (port 3200)
#   - Loki: log aggregation (port 3100)
#   - Jaeger: trace visualization (port 16686)
#
# Usage:
#   docker compose up -d              (start all)
#   docker compose up -d postgres     (start single service)
#   docker compose up -d grafana prometheus tempo loki  (start observability only)
#   docker compose logs -f grafana    (follow logs)
#   docker compose down -v            (stop and remove volumes)

services:
  postgres:
    image: postgres:16-alpine
    container_name: world-office-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-world_office}
      POSTGRES_USER: ${POSTGRES_USER:-worldoffice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-worldoffice_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-worldoffice} -d ${POSTGRES_DB:-world_office}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: world-office-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: world-office-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Observability Stack ──────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: world-office-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    profiles:
      - observability

  grafana:
    image: grafana/grafana:11.3.0
    container_name: world-office-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    profiles:
      - observability

  tempo:
    image: grafana/tempo:2.5.0
    container_name: world-office-tempo
    restart: unless-stopped
    ports:
      - "${TEMPO_PORT:-3200}:3200"   # Tempo API
      - "4317:4317"                   # OTLP gRPC
      - "4318:4318"                   # OTLP HTTP
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    command:
      - "-config.file=/etc/tempo.yaml"
    profiles:
      - observability

  loki:
    image: grafana/loki:2.9.9
    container_name: world-office-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    profiles:
      - observability

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  tempo_data:
    driver: local
  loki_data:
    driver: local
