name: PHPCs

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths: ['web/documentserver-example/php/**']
  pull_request:
    branches: [main, develop]
    paths: ['web/documentserver-example/php/**']

jobs:
  lint:
    runs-on: docker
    container: php:8.2-cli
    defaults:
      run:
        working-directory: ./web/documentserver-example/php
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PHP CS
        run: |
          apt-get update && apt-get install -y wget
          wget https://squizlabs.github.io/PHP_CodeSniffer/phpcs.phar -O /usr/local/bin/phpcs
          chmod +x /usr/local/bin/phpcs

      - name: Lint
        run: phpcs src index.php