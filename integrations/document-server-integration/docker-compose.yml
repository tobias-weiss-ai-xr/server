# -----------------------------------------------------------------------------
# Minimal DocumentServer Test Setup
# -----------------------------------------------------------------------------
#
# Prerequisites:
# Before using this docker-compose setup, you must build the Docker image
# locally from the main repository:
#
#     make build-image
#
# This command builds the image:
#     word-office/documentserver:latest
#
# -----------------------------------------------------------------------------
# Starting the services
# -----------------------------------------------------------------------------
#
# Start the container in the background:
#
#     docker compose up -d
#
# You can monitor the container logs with:
#
#     docker logs -f wo-documentserver
#
# The Document Server is fully started when you see a log message like:
#
#     INFO success: docservice entered RUNNING state
#
# -----------------------------------------------------------------------------
# Start the example application
# -----------------------------------------------------------------------------
#
# The example Node.js application is not started automatically.
# After the container is running, start it manually with:
#
#     docker exec -it wo-documentserver supervisorctl start ds-example
#
# -----------------------------------------------------------------------------
# Access the example
# -----------------------------------------------------------------------------
#
# Open the example in your browser:
#
#     http://localhost:8080/example/
#
# -----------------------------------------------------------------------------

name: minimal-documentserver-test

services:
  documentserver:
    image: word-office/documentserver:latest
    container_name: wo-documentserver
    ports:
      - "8080:80"