name: worldoffice-nextcloud-test

services:
  worldoffice-docs:
    image: ghcr.io/world-office/documentserver:latest
    container_name: wo-docs
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - USE_UNAUTHORIZED_STORAGE=true
      - JWT_SECRET=mysecret
    volumes:
      - wo-data:/var/www/worldoffice/Data
      - wo-logs:/var/log/worldoffice
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  nextcloud:
    image: nextcloud:33
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - nc-data:/var/www/html
      - ./setup-worldoffice.sh:/docker-entrypoint-hooks.d/post-installation/setup-worldoffice.sh:ro
      - ..:/worldoffice-nextcloud:ro
    environment:
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost,127.0.0.1,172.24.0.0/16
      - SQLITE_DATABASE=nextcloud
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin
    depends_on:
      worldoffice-docs:
        condition: service_started

volumes:
  wo-data:
  wo-logs:
  nc-data:
