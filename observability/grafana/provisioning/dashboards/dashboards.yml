# World-Office Grafana Dashboard Provisioning
# ==============================================

apiVersion: 1

providers:
  - name: 'World Office'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
