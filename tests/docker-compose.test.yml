---
# =============================================================================
# World Office E2E Test Stack with OCIS
# =============================================================================

services:
  # Document Server - WOPI Client (Editor)
  documentserver:
    build:
      context: ./docker/documentserver
      dockerfile: Dockerfile
    container_name: test-documentserver
    hostname: documentserver
    restart: "no"
    ports:
      - "8080:80"
    environment:
      - JWT_SECRET=${DOCUMENT_SERVER_JWT_SECRET:-test_ds_jwt_secret_placeholder}
      - JWT_HEADER=Authorization
      - JWT_IN_BODY=true
      - WOPI_ENABLED=true
      - WOPI_HOST=ocis:9200
    volumes:
      - documentserver-data:/var/www/world-office/documentserver/Data
      - documentserver-logs:/var/log/world-office
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/hosting/discovery"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 15

  # OCIS - WOPI Host
  ocis:
    image: owncloud/ocis:5.0
    container_name: test-ocis
    hostname: ocis
    restart: "no"
    ports:
      - "9200:9200"
    environment:
      # Identity (required for OCIS 5.0)
      - OCIS_SYSTEM_USER_ID=95f7e184-878e-4d1e-a23f-10fe5b2d30ff

      # Domain and URLs
      - OCIS_DOMAIN=localhost
      - OCIS_URL=https://localhost:9200
      - PROXY_TLS=false

      # JWT (must match Document Server)
      - OCIS_JWT_SECRET=test_ocis_jwt_secret_placeholder
      - OCIS_TRANSFER_SECRET=test_transfer_secret_placeholder
      - OCIS_MACHINE_AUTH_API_KEY=test-machine-auth-api-key

      # Storage drivers (use OCIS 5.0 defaults - driver names changed from owncloud)

      # Authentication
      - AUTHENTICATION_HANDLERS=basic

      # Demo users
      - IDM_CREATE_DEMO_USERS=true

      # Logging
      - OCIS_LOG_LEVEL=warn
      - OCIS_LOG_PRETTY=true

      # IDP issuer override (OCIS requires https:// for issuer)
      - LIBREGRAPH_ISSUER=https://localhost:9200

      # Skip certificate warnings for testing
      - OCIS_INSECURE=true

      # WOPI collaboration
      - COLLABORATION_WOPI_SRC=http://localhost:9200
      - COLLABORATION_APP_ADDR=http://documentserver:80
      - COLLABORATION_APP_NAME=World Office Document Server
    volumes:
      - ./docker/ocis-init.yaml:/etc/ocis/ocis.yaml:ro
      - ocis-data:/var/lib/ocis
    networks:
      - test-network
    depends_on:
      documentserver:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/health"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 15

networks:
  test-network:
    driver: bridge
    name: worldoffice-test-network

volumes:
  documentserver-data:
    name: test-documentserver-data
  documentserver-logs:
    name: test-documentserver-logs
  ocis-data:
    name: test-ocis-data